<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=SUSE+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <title>Product Card</title>
</head>

<body>
  <div class="button_wrapper">
    <button id="recolor-first-card-button" class="btn">Перекрасить фон первой карточки</button>
    <button id="open-google-button" class="btn">Перейти на страницу Google</button>
    <button id="recolor-all-card-button" class="btn">Перекрасить фон всех карточек</button>
    <button id="click-recolor-button" class="btn recolor">Поменять цвет кнопки</button>
  </div>

  <div class="all-elements background-picture">
    <h1 class="product-selection__title">Выбери свой продукт</h1>
    <div class="product-card__wrapper">

      <template id="product-template">
        <div class="product-card">
          <img class="product-card__img">
          <span class="product-card__for-skin"></span>
          <h3 class="product-card__title"></h3>
          <p class="product-card__descr"></p>
          <div class="product-card__composition">
            <span class="product-card__text"></span>
            <ul class="product-card__list">
            </ul>
          </div>
          <div class="product-card__price-wrapper">
            <span class="product-card__price-text"></span>
            <span class="product-card__price"></span>
          </div>
        </div>
      </template>
    </div>
  </div>
  </div>

</body </html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=SUSE+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <title>Product Card</title>
</head>

<body>
  <div class="button_wrapper">
    <button type="button" id="recolor-first-card-button" class="btn">Перекрасить фон первой карточки</button>
    <button type="button" id="open-google-button" class="btn">Перейти на страницу Google</button>
    <button type="button" id="recolor-all-card-button" class="btn">Перекрасить фон всех карточек</button>
    <button type="button" id="click-recolor-button" class="btn recolor">Поменять цвет кнопки</button>
  </div>

  <button id="open-registration-button"> Зарегистрироваться</button>

  <div class="overlay"></div>
  <div class="modal">
    <h3 class="modal-title" style="margin: auto;">Регистрация</h3>
    <div class="close-register-button">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M5 5L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
    <form class="modal-form">
      <label for="name-input" class="modal-label">имя</label>
      <input type="text" placeholder="введите имя" name="name" class="input" id="name-input" required>

      <label for="surname-input" class="modal-label">фамилия</label>
      <input type="text" placeholder="введите фамилию" name="surname" class="input" id="surname-input" required>

      <label for="birthday-input" class="modal-birthday">дата рождения</label>
      <input type="date" placeholder="введите дату рождения" name="birthday" class="input-date" id="birthday-input"
        required>

      <label for="login-input" class="modal-label">логин</label>
      <input type="text" placeholder="введите логин" name="login" class="input" id="login-input" required>

      <label for="password-input" class="modal-label">пароль</label>
      <input type="password" placeholder="введите пароль" name="password" class="input" id="password-input"
        pattern="(?=.*[0-9])(?=.*[A-Za-z]).{8,}" required>

      <label for="password-repeat-input" class="modal-label">подтверждение пароля</label>
      <input type="password" placeholder="повторите пароль" name="password-repeat" class="input"
        id="password-repeat-input" pattern="(?=.*[0-9])(?=.*[A-Za-z]).{8,}" required>

      <button type="submit" id="registration-done">Зарегистрироваться</button>
    </form>
  </div>



  <div class="all-elements background-picture">
    <h1 class="product-selection__title">Выбери свой продукт</h1>
    <div class="product-card__wrapper">

      <template id="product-template">
        <div class="product-card">
          <img class="product-card__img">
          <span class="product-card__for-skin"></span>
          <h3 class="product-card__title"></h3>
          <p class="product-card__descr"></p>
          <div class="product-card__composition">
            <span class="product-card__text">Состав:</span>
            <ul class="product-card__list">
            </ul>
          </div>
          <div class="product-card__price-wrapper">
            <span class="product-card__price-text">Цена</span>
            <span class="product-card__price"></span>
          </div>
        </div>
      </template>

    </div>
  </div>

  <footer>
    <div class="footer-wrapper">
      <div class="product-hero">
        <h2 class="product-hero-title">Product Cards</h2>
        <p class="product-hero-text">У нас самые лучшие продукты для кожи!</p>
        <img src="/icons/telegram.png" alt="Иконка телеграм" class="icon-telegram">
        <img src="/icons/vk.png" alt="Иконка Вк" class="icon-vk">
      </div>

      <div class="newsletter">
        <h2 class="subscribe-promo">Подпишись на наши акции:</h2>
        <form class="subscribe-form">
          <input type="email" placeholder="Введи Email..." id="input-email" name="userEmail" required>
          <button type="submit" id="subscribe">Подписаться</button>
        </form>
      </div>

      <nav class="navigation">
        <span class="links-header"">Быстрые ссылки</span>
        <ul class=" nav-list">
          <li class="link"><a href="#">Главная</a></li>
          <li class="link"><a href="#">Магазин</a></li>
          <li class="link"><a href="#">Контакты</a></li>
          </ul>
      </nav>
    </div>

    <div class="footer-bottom">
      <div class="line"></div>
      <p class="copyright">www.product-cards.com©all right reserve</p>
    </div>
  </footer>

  <script type="module" src="/JavaScript/homework-8.js"></script>
  <script type="module" src="/JavaScript/product-cards.js"></script>
  <script type="module" src="/JavaScript/homework-9.js"></script>
  <script src="/JavaScript/script.js"></script>
</body>

</html>
